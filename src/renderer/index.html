<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!--
      CSP whitelists:
        - connect-src adds jsdelivr + raw.githubusercontent for the Extensions
          panel (registry.json fetch). All AI provider calls happen in the
          main process and aren't subject to renderer CSP.
        - img-src adds both CDNs for extension icons and screenshots.
    -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https://cdn.jsdelivr.net https://raw.githubusercontent.com https://*.githubusercontent.com; connect-src 'self' https://cdn.jsdelivr.net https://raw.githubusercontent.com;" />
    <title>NexTerm</title>
    <style>
      /* Initial background — overridden by app once React loads.
         Prevents the white-flash before CSS hydrates. */
      html, body { margin: 0; padding: 0; background: #1a1b26; }
      #root { background: transparent; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./src/main.jsx"></script>
  </body>
</html>
